    <!-- Structured Data: FAQPage (AEO: featured snippets + AI direct answers) -->

      "@context": "https://schema.org",
      "@type": "FAQPage",
      "speakable": {
        "@type": "SpeakableSpecification",
        "cssSelector": ["h1", "h2", ".faq-answer"]
      },
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is the minimum order quantity for bulk medical gloves in India?",
          "acceptedAnswer": { "@type": "Answer", "text": "Quensol's minimum order is 10 boxes (1,000 gloves) for standard delivery. Orders above 100 boxes qualify for bulk pricing starting at 8% discount, with priority dispatch within 24 hours." }
        },
        {
          "@type": "Question",
          "name": "Are Quensol gloves CE and FDA certified?",
          "acceptedAnswer": { "@type": "Answer", "text": "Yes. All Quensol medical-grade gloves carry CE marking (EN 455 standard), are FDA Listed, and are manufactured to ISO 9001:2015 quality standards with AQL 1.5. Certificates of Conformance and third-party test reports are provided with every batch." }
        },
        {
          "@type": "Question",
          "name": "Does Quensol offer free glove samples before a bulk order?",
          "acceptedAnswer": { "@type": "Answer", "text": "Yes — Quensol offers up to 3 product samples (1 box each) to qualified healthcare facilities at no cost. Submit a sample request at quensol.com/samples. Samples are dispatched within 48 hours." }
        },
        {
          "@type": "Question",
          "name": "Which cities in India does Quensol deliver medical gloves to?",
          "acceptedAnswer": { "@type": "Answer", "text": "Quensol delivers pan-India to 12+ major cities including Hyderabad (same-day), Bangalore, Chennai, Mumbai, Delhi NCR, Pune, Kolkata, Ahmedabad, Coimbatore, Visakhapatnam, Kochi, and Jaipur. Express next-day delivery is available for orders above 50 boxes in key cities." }
        },
        {
          "@type": "Question",
          "name": "Can hospitals set up a monthly recurring glove supply arrangement?",
          "acceptedAnswer": { "@type": "Answer", "text": "Yes. Quensol's Standing Order programme offers automatic monthly dispatch at locked-in pricing with 5–12% discount versus spot orders, priority stock allocation, and a dedicated account manager. Visit quensol.com/standing-order to apply." }
        },
        {
          "@type": "Question",
          "name": "What types of medical gloves does Quensol supply?",
          "acceptedAnswer": { "@type": "Answer", "text": "Quensol supplies six categories: Nitrile Exam Gloves (AQL 1.5), Neoprene Surgical Sterile, Heavy Duty Safety Gloves, Vinyl Gloves, Aloe Vera Latex, and Latex Surgical Sterile. All medical-grade products are CE marked, ISO 9001 certified, and ASTM D6319 tested." }
        },
        {
          "@type": "Question",
          "name": "What is the difference between nitrile and latex medical gloves?",
          "acceptedAnswer": { "@type": "Answer", "text": "Nitrile gloves are synthetic, latex-free, and allergy-safe — recommended for most clinical uses. Latex gloves are made from natural rubber and offer superior tactile sensitivity for surgical work but carry a risk of Type I hypersensitivity reactions in 4–17% of healthcare workers. Quensol recommends nitrile for general examination and latex/neoprene only for complex surgical procedures." }
        },
        {
          "@type": "Question",
          "name": "How do I become a Quensol distributor in India?",
          "acceptedAnswer": { "@type": "Answer", "text": "Quensol is actively recruiting distribution partners across India. Distributors receive exclusive territory rights, 20–35% gross margins, drop-ship support, and a dedicated account manager. Apply at quensol.com/distributors or call +91 7386101845." }
        }
      ]
    }
    </script>
