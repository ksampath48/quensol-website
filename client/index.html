    <!-- Structured Data: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is the minimum order quantity for bulk gloves?",
          "acceptedAnswer": { "@type": "Answer", "text": "Our minimum order is 10 boxes (1,000 gloves) for standard delivery. Orders above 100 boxes qualify for bulk pricing and priority dispatch within 24 hours." }
        },
        {
          "@type": "Question",
          "name": "Are Quensol gloves CE and FDA certified?",
          "acceptedAnswer": { "@type": "Answer", "text": "Yes. All our medical-grade gloves carry CE marking (EN 455 standard), are FDA Listed, and are manufactured to ISO 9001:2015 quality standards. Certificates of Conformance are available on request." }
        },
        {
          "@type": "Question",
          "name": "Do you offer free samples before a bulk order?",
          "acceptedAnswer": { "@type": "Answer", "text": "Yes — we offer up to 3 product samples (1 box each) to qualified healthcare facilities. Submit a sample request at quensol.com/samples. Samples are dispatched within 48 hours." }
        },
        {
          "@type": "Question",
          "name": "What cities do you deliver to?",
          "acceptedAnswer": { "@type": "Answer", "text": "We deliver pan-India. We have dedicated distribution in Hyderabad, Bangalore, Chennai, Mumbai, Delhi NCR, and Pune. Express 24-hour delivery is available in these cities for orders above 50 boxes." }
        },
        {
          "@type": "Question",
          "name": "Can I set up a monthly recurring supply arrangement?",
          "acceptedAnswer": { "@type": "Answer", "text": "Yes. Our Standing Order programme offers automatic monthly dispatch at locked-in pricing, with a 5–12% discount versus spot orders. Visit quensol.com/standing-order to apply." }
        }
      ]
    }
    </script>
